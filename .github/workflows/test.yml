name: Test

on:
  push:
    branches:
      - main
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
  pull_request:
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'

  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Run unit tests
        run: go test ./...

      - name: Run integration tests
        run: go test -tags integration -count=1 ./internal/infrastructure/...

      - name: Run E2E tests
        run: go test -tags e2e -count=1 ./internal/e2e/...
