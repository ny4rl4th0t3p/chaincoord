name: Web

on:
  pull_request:
    paths:
      - 'web/**'

  workflow_dispatch:

jobs:
  build-lint-test:
    name: build / lint / unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: web/app/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile
        working-directory: web/app

      - name: Build
        run: yarn build
        working-directory: web/app

      - name: Lint
        run: yarn lint
        working-directory: web/app

      - name: Unit tests
        run: yarn test
        working-directory: web/app

  e2e:
    name: playwright e2e
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Build coordd
        run: go build -o bin/coordd ./cmd/coordd

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: web/app/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile
        working-directory: web/app

      - name: Install Playwright browsers
        run: yarn playwright:install
        working-directory: web/app

      - name: Run Playwright tests
        run: yarn playwright
        working-directory: web/app