name: Web Release

on:
  push:
    tags:
      - 'web/v*'

jobs:
  validate:
    name: build / lint / unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: web/app/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile
        working-directory: web/app

      - name: Build
        run: yarn build
        working-directory: web/app

      - name: Lint
        run: yarn lint
        working-directory: web/app

      - name: Unit tests
        run: yarn test
        working-directory: web/app

  e2e:
    name: playwright e2e
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Build coordd
        run: go build -o bin/coordd ./cmd/coordd

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: web/app/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile
        working-directory: web/app

      - name: Install Playwright browsers
        run: yarn playwright:install
        working-directory: web/app

      - name: Run Playwright tests
        run: yarn playwright
        working-directory: web/app

  release:
    name: create github release
    runs-on: ubuntu-latest
    needs: [validate, e2e]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        run: |
          prev=$(git tag --sort=-version:refname | grep '^web/v' | sed -n '2p')
          if [ -n "$prev" ]; then
            range="${prev}..HEAD"
          else
            range="HEAD"
          fi

          commits=$(git log --pretty=format:"%s" $range -- web/ \
            | grep -vE '^(chore|ci)[:(]|^Merge (pull request|branch)' || true)

          write_section() {
            local title="$1" pattern="$2"
            local matches
            matches=$(printf '%s\n' "$commits" | grep -E "$pattern" || true)
            if [ -n "$matches" ]; then
              printf '## %s\n' "$title"
              printf '%s\n' "$matches" | sed 's/^/- /'
              printf '\n'
            fi
          }

          {
            write_section "Features"      '^feat'
            write_section "Bug Fixes"     '^fix'
            write_section "Performance"   '^perf'
            write_section "Refactors"     '^refactor'
            write_section "Documentation" '^docs'

            other=$(printf '%s\n' "$commits" \
              | grep -vE '^(feat|fix|perf|refactor|docs)[:(]' || true)
            if [ -n "$other" ]; then
              printf '## Other\n'
              printf '%s\n' "$other" | sed 's/^/- /'
              printf '\n'
            fi
          } > "$RUNNER_TEMP/release-notes.md"

      - name: Create release
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file "$RUNNER_TEMP/release-notes.md"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}